# Readiness Scoring Rules — v2
# Rebuilt: individualized rolling baselines instead of fixed thresholds.
#
# Inputs: hrv_ms, rhr_delta, sleep_hours, symptom_load, subjective_energy
# Output: readiness tier — LOW | MODERATE | HIGH
#
# Conflict resolution: lowest signal wins. Conservative by default.

conflict_resolution: lowest_signal_wins

# ─── BASELINE MODEL ──────────────────────────────────────────────────────────
#
# Fixed HRV thresholds (35/55ms) are invalid for female athletes — HRV varies
# by individual and fluctuates with OC pill schedule, stress, and training load.
# Instead, use the individual's own rolling data.
#
# Cold start: Until 14+ days of data exist, use initial defaults derived from
# the user's first week of readings. Current initial baseline (from Mar 5–14 data):
#   HRV baseline: ~57 ms (range 53–66, SD ~4.5)
#   RHR baseline: ~53 bpm
#
# After 14 days: compute rolling 14-day mean and SD. Update automatically.
# After each full pill pack (28 days): recalculate and store updated baseline.

baseline_model:
  hrv:
    method: rolling_14day_mean_sd
    cold_start_mean: 57
    cold_start_sd: 4.5
    update_frequency: daily
    notes: >
      Use individual's own data, not population norms. HRV is highly individual.
      A reading that's LOW for one person may be HIGH for another.
  rhr:
    method: rolling_7day_mean
    cold_start_mean: 53
    notes: >
      RHR delta (current vs 7-day avg) is already individualized. No change needed.

# ─── TIER DEFINITIONS ─────────────────────────────────────────────────────────

tiers:
  LOW:
    label: "Recovery Only"
    description: >
      Signals indicate significant stress or under-recovery. Active recovery
      only: walking, elliptical at easy pace (YouTube pace), gentle mobility.
      No structured strength or high-intensity work.
    triggers:
      - signal: hrv_ms
        condition: "> 1.5 SD below individual baseline"
        example: "If baseline mean is 57 and SD is 4.5, LOW triggers below ~50ms"
        justification:
          citation_key: plews_2013_hrv
          rationale: >
            HRV more than 1.5 SD below individual baseline indicates suppressed
            parasympathetic tone relative to this person's norm. Training through
            this window delays recovery.
      - signal: rhr_delta
        condition: "> +8 bpm above 7-day average"
        justification:
          citation_key: hynynen_2006_rhr
          rationale: >
            RHR elevation > 8bpm above rolling average is a reliable marker of
            autonomic dysregulation and accumulated fatigue.
      - signal: sleep_hours
        condition: "< 5 hours"
        justification:
          citation_key: watson_2017_sleep
          rationale: >
            Fewer than 5 hours produces measurable decrements in reaction time,
            power output, and recovery capacity.
      - signal: symptom_load
        condition: "total symptom score >= 8 (out of 12)"
        justification:
          rationale: >
            High symptom burden (bloating + GI + cramps + fatigue) impairs
            training capacity regardless of objective markers. Symptoms are data.

  MODERATE:
    label: "Reduced Volume"
    description: >
      Partial recovery or moderate symptom load. Reduce total volume 20–30%.
      Cap intensity at RPE 7. Technique work and submaximal strength are
      appropriate. Elliptical or easy running fine. No maximal efforts or PRs.
    triggers:
      - signal: hrv_ms
        condition: "0.5–1.5 SD below individual baseline"
        example: "If baseline mean is 57 and SD is 4.5, MODERATE is roughly 50–55ms"
        justification:
          citation_key: plews_2013_hrv
          rationale: >
            HRV moderately below baseline indicates partial recovery. Training
            is appropriate but volume should be reduced to avoid tipping into
            overreaching.
      - signal: rhr_delta
        condition: "+3 to +8 bpm above 7-day average"
        justification:
          citation_key: hynynen_2006_rhr
      - signal: sleep_hours
        condition: "5–7 hours"
        justification:
          citation_key: watson_2017_sleep
      - signal: symptom_load
        condition: "total symptom score 4–7"
    volume_adjustment: "reduce 20–30% from prescribed"
    intensity_cap: "RPE 7 maximum; no maximal efforts"

  HIGH:
    label: "Full Programming"
    description: >
      Signals indicate good recovery and low symptom load. Full prescribed
      volume and intensity. Progressive overload, new exercises, and PR
      attempts are all appropriate.
    triggers:
      - signal: hrv_ms
        condition: "within 0.5 SD of baseline or above"
        example: "If baseline mean is 57 and SD is 4.5, HIGH is ~55ms and above"
        justification:
          citation_key: plews_2013_hrv
          rationale: >
            HRV at or above individual baseline indicates robust recovery and
            readiness for adaptation.
      - signal: rhr_delta
        condition: "< +3 bpm above 7-day average"
        justification:
          citation_key: hynynen_2006_rhr
      - signal: sleep_hours
        condition: "> 7 hours"
        justification:
          citation_key: watson_2017_sleep
      - signal: symptom_load
        condition: "total symptom score 0–3"

# ─── SYMPTOM LOAD SCORING ────────────────────────────────────────────────────
#
# New signal: captures what HRV/RHR/sleep miss — especially relevant on OC.
# Each symptom rated 0–3 (none / mild / moderate / severe). Sum = symptom_load.

symptom_scoring:
  inputs:
    - bloating: 0–3
    - gi_symptoms: 0–3  # nausea, cramps, diarrhea
    - cramps_pain: 0–3  # menstrual cramps, breast tenderness, headache
    - fatigue: 0–3      # distinct from subjective_energy — physical heaviness
  max_score: 12
  thresholds:
    low_load: 0–3
    moderate_load: 4–7
    high_load: 8–12
  notes: >
    Symptom load can downgrade readiness but never upgrade it. If HRV says
    HIGH but symptom load is 8+, apply MODERATE. Symptoms are real signals,
    not excuses. The system tracks these over time to find patterns — do
    symptoms cluster around certain pill pack days, diet patterns, or
    training loads?

# ─── SUBJECTIVE ENERGY OVERRIDE ──────────────────────────────────────────────

subjective_energy_override:
  downgrade_rule: >
    If objective signals say HIGH but subjective_energy <= 3, downgrade to
    MODERATE and flag the conflict. Ask: "Your numbers look good but you feel
    rough — want to push through or dial back?"
  upgrade_rule: >
    Subjective energy can never upgrade readiness. If objective signals say
    MODERATE but energy is 9/10, note it but hold MODERATE. Log for calibration.

# ─── EDGE CASES ───────────────────────────────────────────────────────────────

notes:
  - >
    If only two of three objective signals (HRV, RHR, sleep) are available,
    score with what's available. If only one is available, combine it with
    subjective energy and symptom load to make a conservative estimate.
  - >
    If HRV data is missing entirely, fall back to: RHR delta + sleep + symptom
    load + subjective energy. The system still works without HRV — it's just
    less precise.
  - >
    Baseline recalculation happens automatically. After 14+ days of data,
    cold start values are replaced. The retrospective agent monitors whether
    the baseline is drifting (improving fitness = rising HRV baseline over months).
