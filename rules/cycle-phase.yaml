# Hormonal Context Rules — v2 (OC Mode)
#
# User is on Tyblume (combined oral contraceptive). This replaces the
# natural 5-phase cycle model entirely.
#
# On combined OC:
# - Endogenous estrogen and progesterone are suppressed
# - Synthetic hormones are delivered at steady state during active pills
# - Withdrawal bleed during placebo week is not a real menstrual period
# - The hormonal rationale for phase-based intensity ceilings does NOT apply
#
# Instead: readiness scoring + symptom tracking drive everything.
# Pill pack position is tracked so the retrospective engine can detect
# patterns over time, but it does NOT set intensity ceilings.

mode: oral_contraceptive
medication: Tyblume
type: combined_oc

# ─── PILL PACK TRACKING ──────────────────────────────────────────────────────

pill_pack:
  active_days: 1–21
  placebo_days: 22–28
  total_days: 28

  active_phase:
    label: "Active Pills"
    hormone_state: "Steady-state synthetic estrogen + progestin"
    intensity_ceiling: null  # No ceiling — readiness determines everything
    notes: >
      No expected performance variation from hormones during active pills.
      Any symptoms (bloating, fatigue, mood) during this phase are likely
      driven by diet, stress, sleep, or training load — not pill schedule.
      Track symptoms to find the real pattern.

  placebo_phase:
    label: "Placebo Week"
    hormone_state: "Synthetic hormone withdrawal — withdrawal bleed likely"
    intensity_ceiling: null  # Still no hard ceiling — symptoms may warrant MODERATE
    notes: >
      Hormone withdrawal can cause real symptoms: fatigue, cramping, mood
      shifts, bloating, heavier bleeding. These vary person to person.
      The system does NOT assume you'll feel bad — it checks via symptom
      scoring and readiness. If you feel great during placebo week, train
      normally. If symptoms are high, readiness scoring will catch it.

# ─── HOW THIS REPLACES THE OLD MODEL ─────────────────────────────────────────
#
# Old model (natural cycle):
#   menstrual → follicular → ovulatory → early luteal → late luteal
#   Each phase had an intensity ceiling (MODERATE or HIGH)
#   Phase determined by cycle day on a fixed 28-day calendar
#
# New model (OC):
#   active pills → placebo week
#   NO intensity ceilings from pill schedule
#   Readiness tier (from readiness.yaml) is the ONLY intensity determinant
#   Symptoms are tracked daily and feed into readiness scoring
#   Pill pack day is logged so retrospective can detect individual patterns
#
# Why: Phase-based intensity ceilings were based on natural hormone
# fluctuations (estrogen surge in follicular, progesterone in luteal).
# On combined OC, these fluctuations are suppressed. Applying natural-cycle
# rules to an OC user would be pseudoscience.
#
# Citation: Sims (2024 ROAR revised) — for OC users, readiness-based
# training replaces cycle-synced training entirely.

# ─── PATTERN DETECTION (RETROSPECTIVE) ───────────────────────────────────────

pattern_detection:
  enabled: true
  notes: >
    Even on OC, some women experience predictable symptom patterns tied to
    their pill pack. After 2+ pill pack cycles of data, the retrospective
    engine should analyze:
    - Do symptoms cluster around specific pill pack days?
    - Is placebo week consistently harder (higher RPE, lower energy)?
    - Are there diet or sleep patterns that correlate with symptom days
      more strongly than pill pack position?
    The goal: find YOUR pattern, not assume one from a textbook.

# ─── WITHDRAWAL BLEED TRACKING ───────────────────────────────────────────────

bleed_tracking:
  purpose: >
    Track flow volume (light/moderate/heavy/absent) during placebo week.
    Not for phase-based training decisions — for iron deficiency awareness.
    Consistently heavy flow warrants periodic ferritin checks.
  flow_scale:
    - light: "Minimal flow, liners sufficient"
    - moderate: "Regular flow, pads/tampons needed"
    - heavy: "Soaking through pads/tampons, clots present"
    - absent: "No withdrawal bleed — flag for awareness, common on some OCs"
  iron_flag: >
    If flow is consistently heavy for 3+ cycles, prompt: "Heavy withdrawal
    bleeds can deplete iron over time. Consider checking your ferritin
    levels at your next doctor visit."
  citation_key: iron_deficiency_female_athletes
